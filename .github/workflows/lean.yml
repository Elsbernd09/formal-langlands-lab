name: Lean Build

on:
  push:
  pull_request:

jobs:
  build:
    name: Build Lean project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Build project
        run: lake build
